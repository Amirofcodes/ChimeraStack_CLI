services:
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT}
      - VITE_FRONTEND_PORT=${FRONTEND_PORT}
      - VITE_BACKEND_PORT=${BACKEND_PORT}
      - VITE_MYSQL_PORT=${MYSQL_PORT}
      - VITE_ADMINER_PORT=${ADMINER_PORT}
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./docker/php
      target: app_dev
    volumes:
      - ./backend:/var/www/html:rw,cached
      - ./backend/var:/var/www/html/var:rw
    environment:
      - APP_ENV=dev
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "${BACKEND_PORT}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:rw
    depends_on:
      - backend
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app_network:
    name: ${PROJECT_NAME}_network

volumes:
  mysql_data:
    name: ${PROJECT_NAME}_mysql_data