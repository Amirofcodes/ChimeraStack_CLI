project:
  name: ${PROJECT_NAME}
  language: fullstack
  framework: symfony-react
  environment: development

services:
  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT}
      - PORT=${FRONTEND_PORT}
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules

  backend:
    build:
      context: ./backend
    environment:
      - APP_ENV=dev
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    volumes:
      - ./backend:/var/www/html:cached
      - ./backend/var:/var/www/html/var

  mysql:
    ports:
      - ${MYSQL_PORT}:3306
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    ports:
      - ${ADMINER_PORT}:8080
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
